<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机械臂3D可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; }
        .container { display: flex; height: 100vh; }
        #canvas-container { flex: 1; position: relative; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        #canvas-container canvas { width: 100% !important; height: 100% !important; }
        .sidebar { width: 320px; background: #16213e; padding: 20px; overflow-y: auto; border-left: 1px solid #0f3460; }
        .sidebar h2 { font-size: 18px; margin-bottom: 20px; color: #4ecdc4; }
        .panel { background: #1a1a2e; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .panel-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #4ecdc4; }
        .joint-control { display: flex; align-items: center; margin-bottom: 10px; }
        .joint-label { width: 50px; font-size: 12px; color: #888; }
        .joint-slider { flex: 1; -webkit-appearance: none; height: 6px; background: #0f3460; border-radius: 3px; outline: none; }
        .joint-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #4ecdc4; border-radius: 50%; cursor: pointer; }
        .joint-value { width: 50px; text-align: right; font-size: 12px; font-family: monospace; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .btn-primary { background: #4ecdc4; color: #1a1a2e; }
        .btn-secondary { background: #0f3460; color: #eee; }
        .status-indicator { display: flex; align-items: center; gap: 8px; padding: 10px; background: #0f3460; border-radius: 4px; margin-bottom: 15px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #e74c3c; }
        .status-dot.connected { background: #2ecc71; }
        .info-row { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid #0f3460; }
        .info-label { color: #888; }
        .info-value { color: #4ecdc4; font-family: monospace; }
        .view-controls { display: flex; gap: 5px; }
        .view-btn { padding: 5px 10px; background: #0f3460; border: none; border-radius: 4px; color: #888; cursor: pointer; font-size: 11px; }
        .view-btn.active { background: #4ecdc4; color: #1a1a2e; }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26, 26, 46, 0.9); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 100; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #0f3460; border-top-color: #4ecdc4; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div id="canvas-container">
            <div class="loading-overlay" id="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 15px;">加载3D场景...</p>
            </div>
        </div>
        <div class="sidebar">
            <h2>🎯 机械臂3D视图</h2>
            <div class="status-indicator">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">未连接</span>
            </div>
            <div class="panel">
                <div class="panel-title">视图控制</div>
                <div class="view-controls">
                    <button class="view-btn active" onclick="setView('front')">正面</button>
                    <button class="view-btn" onclick="setView('top')">顶部</button>
                    <button class="view-btn" onclick="setView('side')">侧面</button>
                    <button class="view-btn" onclick="setView('perspective')">透视</button>
                </div>
            </div>
            <div class="panel">
                <div class="panel-title">左臂关节控制</div>
                <div id="left-joints"></div>
            </div>
            <div class="panel">
                <div class="panel-title">右臂关节控制</div>
                <div id="right-joints"></div>
            </div>
            <div class="panel">
                <div class="panel-title">实时数据</div>
                <div id="realtime-data">
                    <div class="info-row"><span class="info-label">FPS</span><span class="info-value" id="fps-value">60</span></div>
                    <div class="info-row"><span class="info-label">左臂末端X</span><span class="info-value" id="left-end-x">0.00</span></div>
                    <div class="info-row"><span class="info-label">左臂末端Y</span><span class="info-value" id="left-end-y">0.00</span></div>
                    <div class="info-row"><span class="info-label">右臂末端X</span><span class="info-value" id="right-end-x">0.00</span></div>
                    <div class="info-row"><span class="info-label">右臂末端Y</span><span class="info-value" id="right-end-y">0.00</span></div>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="resetView()">重置视角</button>
                <button class="btn btn-primary" onclick="syncFromReal()">同步实机</button>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, leftArm, rightArm;
        const JOINT_COLORS = [0xFF6B6B, 0x4ECDC4, 0x45B7D1, 0x96CEB4, 0xFFEAA7, 0xDDA0DD, 0x98D8C8];
        const LINK_COLOR = 0x666666, BASE_COLOR = 0x333333;
        
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            const container = document.getElementById('canvas-container');
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(2, 1.5, 2);
            camera.lookAt(0, 0.3, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);
            
            const grid = new THREE.GridHelper(2, 20, 0x0f3460, 0x0f3460);
            scene.add(grid);
            
            leftArm = createArm(-0.3);
            rightArm = createArm(0.3);
            scene.add(leftArm);
            scene.add(rightArm);
            
            createJointControls('left');
            createJointControls('right');
            bindSliderEvents();
            
            setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
            window.addEventListener('resize', onWindowResize);
            animate();
        }
        
        function createArm(xOffset) {
            const arm = new THREE.Group();
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.1, 32), new THREE.MeshStandardMaterial({ color: BASE_COLOR }));
            base.position.y = 0.05;
            arm.add(base);
            
            const joints = [], links = [];
            for (let i = 0; i < 7; i++) {
                const joint = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), new THREE.MeshStandardMaterial({ color: JOINT_COLORS[i], emissive: JOINT_COLORS[i], emissiveIntensity: 0.2 }));
                joint.position.set(xOffset, 0.1 + i * 0.1, 0);
                joints.push(joint);
                arm.add(joint);
                
                if (i < 6) {
                    const link = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.1, 16), new THREE.MeshStandardMaterial({ color: LINK_COLOR }));
                    link.position.set(xOffset, 0.15 + i * 0.1, 0);
                    links.push(link);
                    arm.add(link);
                }
            }
            arm.userData = { joints, links, xOffset };
            return arm;
        }
        
        function createJointControls(armId) {
            const container = document.getElementById(armId + '-joints');
            for (let i = 0; i < 7; i++) {
                const div = document.createElement('div');
                div.className = 'joint-control';
                div.innerHTML = `<span class="joint-label">J${i+1}</span><input type="range" class="joint-slider" min="-3.14" max="3.14" step="0.01" value="0" data-arm="${armId}" data-joint="${i}"><span class="joint-value" id="${armId}-j${i}-value">0.00</span>`;
                container.appendChild(div);
            }
        }
        
        function bindSliderEvents() {
            document.querySelectorAll('.joint-slider').forEach(slider => {
                slider.addEventListener('input', e => {
                    const arm = e.target.dataset.arm, joint = e.target.dataset.joint, value = parseFloat(e.target.value);
                    document.getElementById(`${arm}-j${joint}-value`).textContent = value.toFixed(2);
                    updateArmPose(arm === 'left' ? leftArm : rightArm, arm);
                });
            });
        }
        
        function updateArmPose(arm, armId) {
            const { joints, xOffset } = arm.userData;
            for (let i = 0; i < 7; i++) {
                const slider = document.querySelector(`input[data-arm="${armId}"][data-joint="${i}"]`);
                const angle = slider ? parseFloat(slider.value) : 0;
                joints[i].position.y = 0.1 + i * 0.1 + Math.sin(angle) * 0.02;
                joints[i].position.x = xOffset + Math.cos(angle) * 0.02;
            }
            document.getElementById(`${armId}-end-x`).textContent = joints[6].position.x.toFixed(2);
            document.getElementById(`${armId}-end-y`).textContent = joints[6].position.y.toFixed(2);
        }
        
        function setView(view) {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const views = { front: [0, 0.5, 2], top: [0, 2, 0.01], side: [2, 0.5, 0], perspective: [2, 1.5, 2] };
            camera.position.set(...views[view]);
            camera.lookAt(0, 0.3, 0);
        }
        
        function resetView() { camera.position.set(2, 1.5, 2); camera.lookAt(0, 0.3, 0); }
        function syncFromReal() { console.log('同步实机数据...'); }
        
        let lastTime = performance.now(), frameCount = 0;
        function animate() {
            requestAnimationFrame(animate);
            frameCount++;
            if (performance.now() - lastTime >= 1000) {
                document.getElementById('fps-value').textContent = frameCount;
                frameCount = 0; lastTime = performance.now();
            }
            renderer.render(scene, camera);
        }
        
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        
        init();
    </script>
</body>
</html>
